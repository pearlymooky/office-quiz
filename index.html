<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบ ทบทวนลดหย่อน</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="container">
        <div id="login-screen" class="screen active">
            <h2>เข้าสู่ระบบแบบทดสอบ</h2>
            <div class="form-group">
                <label for="emp-id">รหัสพนักงาน:</label>
                <input type="text" id="emp-id" placeholder="เช่น 70001234" required>
            </div>
            <div class="form-group">
                <label for="emp-name">ชื่อ - นามสกุล (ไม่มีคำนำหน้า):</label>
                <input type="text" id="emp-name" placeholder="กรอกเพื่อยืนยันตัวตนในครั้งแรก" required>
            </div>
            <div class="form-group">
                <label for="emp-pin">รหัส PIN (ตัวเลข 4 หลัก):</label>
                <input type="password" id="emp-pin" placeholder="ตั้งใหม่ / กรอกรหัสเดิมเพื่อเข้าสอบ" maxlength="4" required>
            </div>
            <div class="form-group">
                <div style="font-weight: 600; font-size: 16px; margin-bottom: 5px;">📋 กติกาการทดสอบ:</div>
                <ul style="text-align: left; margin: 0; padding-left: 20px; font-size: 14px; font-weight: 400; line-height: 1.6;">
                    <li>สุ่มข้อสอบจากคลังจำนวน 20 ข้อ</li>
                    <li><b>จำกัดเวลาในการทำแบบทดสอบ 1 ชั่วโมง</b></li>
                    <li>สามารถทำแบบทดสอบได้<b>สูงสุด 3 ครั้ง</b> (หากไม่ผ่านเกณฑ์) ระบบจะคัดเลือกคะแนนครั้งที่ดีที่สุด</li>
                </ul>
            <button id="login-btn" class="btn-primary" onclick="checkLogin()">ตรวจสอบข้อมูลและเข้าสอบ</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <button class="btn-back" onclick="promptExitQuiz()">❮ ออกจากการสอบ</button>
                <div id="user-display" class="user-info"></div>
            </div>
            
            <div class="progress-container">
                <div id="progress-bar-fill" class="progress-fill"></div>
            </div>
            <div id="progress-text" class="progress-text">ข้อที่ 1 / 20</div>
            <hr>
            
            <div id="quiz-area">
                <p style="text-align:center;">กำลังเตรียมข้อสอบ...</p>
            </div>

            <div class="nav-buttons" id="nav-buttons" style="display: none;">
                <button id="prev-btn" class="btn-secondary" onclick="promptPrevQuestion()">❮ ย้อนกลับ</button>
                <button id="next-btn" class="btn-primary" onclick="nextQuestion()">ถัดไป ❯</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2>สรุปผลการทดสอบ</h2>
            <div id="result-area"></div>
            <button class="btn-secondary" onclick="showReviewScreen()" style="margin-top: 15px; width: 100%;">📄 ดูเฉลยและคำอธิบาย</button>
            <button class="btn-primary" onclick="location.reload()" style="margin-top: 10px;">กลับสู่หน้าหลัก</button>
        </div>

        <div id="review-screen" class="screen">
            <h2>เฉลยและคำอธิบาย</h2>
            <div id="review-area" style="max-height: 400px; overflow-y: auto; padding-right: 10px;"></div>
            <button class="btn-primary" onclick="location.reload()" style="margin-top: 20px;">กลับสู่หน้าหลัก</button>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">แจ้งเตือน</h3>
            <p id="modal-desc"></p>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="btn-secondary" onclick="closeModal()">ยกเลิก</button>
                <button id="modal-confirm-btn" class="btn-primary">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
