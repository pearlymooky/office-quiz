<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เครื่องมือนำเข้าข้อสอบ</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 20px; background: #f4f7f6; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 800px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 250px; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        #status { margin-top: 15px; font-weight: bold; line-height: 1.6; }
        .error-log { color: #c5221f; font-size: 14px; margin-top: 5px; background: #fce8e6; padding: 10px; border-radius: 6px; border-left: 4px solid #c5221f; }
    </style>
</head>
<body>

    <div class="container">
        <h2>นำเข้าคลังข้อสอบ (เวอร์ชันป้องกัน Error)</h2>
        <p>เรียงคอลัมน์ 7 ช่องตามนี้: <br><b>คำถาม | ตัวเลือก1 | ตัวเลือก2 | ตัวเลือก3 | ตัวเลือก4 | เฉลย (ใส่แค่เลข 1-4) | อธิบาย</b></p>
        
        <textarea id="excel-data" placeholder="ก๊อปปี้ข้อมูลข้อสอบ 7 คอลัมน์จาก Excel มาวางตรงนี้..."></textarea>
        <button onclick="importQuestions()">เริ่มนำเข้าข้อสอบ</button>
        
        <div id="status" style="color: #1a73e8;">รอรับข้อมูล...</div>
    </div>

    <script>
        // วางโค้ด Config ของคุณตรงนี้ 
        const firebaseConfig = {
            apiKey: "AIzaSyDY-LYy_ci9Jz5Wre4zDRCr8TP-58ng-bo",
            authDomain: "my-office-quiz.firebaseapp.com",
            projectId: "my-office-quiz",
            storageBucket: "my-office-quiz.firebasestorage.app",
            messagingSenderId: "1075817017274",
            appId: "1:1075817017274:web:ac54fd1f8a9a0e3d06f783",
            measurementId: "G-ZDXMQC8QB9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function importQuestions() {
            const rawData = document.getElementById('excel-data').value.trim();
            if (!rawData) { alert("กรุณาวางข้อมูลข้อสอบก่อนครับ"); return; }

            const rows = rawData.split('\n');
            let successCount = 0;
            let errorCount = 0;
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerHTML = `<span style="color:#1a73e8;">กำลังสแกนและนำเข้าข้อสอบ... โปรดอย่าเพิ่งปิดหน้าจอ</span><br><br>`;

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i].trim();
                if (!row) continue;

                const cols = row.split('\t');
                
                if (cols.length >= 7) {
                    const questionText = cols[0].trim();
                    const options = [cols[1].trim(), cols[2].trim(), cols[3].trim(), cols[4].trim()];
                    
                    // ระบบกรองขั้นสูง: ดึงมาเฉพาะ "ตัวเลข" จากคอลัมน์เฉลย ป้องกันการพิมพ์เว้นวรรคหรือตัวอักษรปน
                    const answerRaw = cols[5].trim().replace(/[^0-9]/g, ''); 
                    const answer = parseInt(answerRaw);
                    const explanationText = cols[6].trim();

                    // ตรวจสอบความถูกต้องของเฉลย
                    if (isNaN(answer) || answer < 1 || answer > 4) {
                        statusDiv.innerHTML += `<div class="error-log">❌ <b>ข้ามข้อ:</b> "${questionText.substring(0,40)}..." <br><b>สาเหตุ:</b> ช่องเฉลยอ่านค่าตัวเลข 1-4 ไม่ได้ (คอลัมน์อาจจะเลื่อน หรือใส่ข้อมูลผิดช่อง)</div>`;
                        errorCount++;
                        continue; // ข้ามข้อที่พังไป ไม่บันทึกลงฐานข้อมูลให้เกิด NaN
                    }

                    try {
                        await db.collection('questions').add({
                            question: questionText,
                            options: options,
                            answer: answer,
                            explanation: explanationText
                        });
                        successCount++;
                    } catch (error) {
                        console.error("เกิดข้อผิดพลาดที่ข้อ: " + questionText, error);
                    }
                } else {
                    // กรณีคอลัมน์มาไม่ครบ 7 ช่อง
                    statusDiv.innerHTML += `<div class="error-log">❌ <b>ข้ามบรรทัดที่ ${i+1} ใน Excel:</b> <br><b>สาเหตุ:</b> ก๊อปปี้คอลัมน์มาไม่ครบ 7 ช่อง หรือมีการกด Enter ค้างไว้ในเซลล์</div>`;
                    errorCount++;
                }
            }

            let finalMessage = `<br><span style="color: #137333; font-size: 18px;">🎉 นำเข้าสำเร็จ <b>${successCount}</b> ข้อ!</span>`;
            if (errorCount > 0) {
                finalMessage += `<br><br><span style="color: #c5221f;">⚠️ มีข้อที่ถูกข้าม <b>${errorCount}</b> ข้อ เนื่องจากข้อมูลผิดพลาด<br>(กรุณาเช็คข้อความแถบสีแดงด้านบน ไปแก้ใน Excel แล้วก๊อปมาวางซ้ำเฉพาะข้อที่ผิดครับ)</span>`;
            }
            statusDiv.innerHTML += finalMessage;
        }
    </script>
</body>
</html>
